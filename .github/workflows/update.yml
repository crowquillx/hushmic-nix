name: Update HushMic

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v17
        with:
          name: hushmic-nix
          authToken: ${{ secrets.CACHIX_AUTH }}
      - uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-flakehub: false
          use-gha-cache: true
      - name: Update package and flake inputs
        run: |
          nix flake update
          nix run nixpkgs#nix-update -- hushmic --flake
      - name: Verify package
        run: nix build .#hushmic
      - uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN || github.token }}
          branch: automation/update-hushmic
          delete-branch: true
          commit-message: "chore: update HushMic"
          title: "chore: update HushMic"
          body: "Automated update of HushMic and the pinned flake inputs."
